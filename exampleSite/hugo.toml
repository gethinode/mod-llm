baseURL = 'http://example.org/'
languageCode = 'en-us'
title = 'Test site for mod-llm'

[outputFormats]
  [outputFormats.llmstxt]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true
    rel = "alternate"
    root = true

  [outputFormats.markdown]
    mediaType = "text/markdown"
    baseName = "index"
    isPlainText = true
    isHTML = false
    noUgly = false
    rel = "alternate"

  [outputFormats.llmscomponents]
    mediaType = "application/json"
    baseName = "llms-components"
    isPlainText = true
    notAlternative = true
    root = true

[outputs]
  home = ["HTML", "llmstxt", "llmscomponents", "markdown"]
  page = ["HTML", "markdown"]

[module]
  # Build and serve using local mod-llm clone declared in the named Hugo workspace:
  workspace = "mod-llm.work"
  [[module.imports]]
    path = "github.com/gethinode/mod-llm"
  [[module.imports.mounts]]
    source = "dist"
    target = "static"
  [[module.imports.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.imports.mounts]]
    source = "i18n"
    target = "i18n"
  [[module.imports]]
    path = "github.com/gethinode/mod-bootstrap-icons"
  [[module.imports]]
    path = "github.com/gethinode/mod-blocks"
  [[module.imports]]
    path = "github.com/gethinode/mod-docs"
  [[module.imports.mounts]]
    source = "assets"
    target = "assets"
  [[module.imports.mounts]]
    source = "content"
    target = "content/docs"
  [[module.imports.mounts]]
    source = "data"
    target = "data"
  [[module.imports.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.imports.mounts]]
    source = "static"
    target = "static"
  [[module.imports]]
    path = "github.com/gethinode/mod-cookieyes/v2"
  [[module.imports]]
    path = "github.com/gethinode/hinode/v2"

[params.modules.fontawesome]
  defaultFamily = "bi"
