[module]
  [module.hugoVersion]
    extended = true
    min = "0.141.0"
    max = ""
  [[module.imports]]
    path = "github.com/gethinode/mod-utils/v5"
  [[module.mounts]]
    source = 'layouts'
    target = 'layouts'
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    source = 'static'
    target = 'static'
  [[module.mounts]]
    source = 'i18n'
    target = 'i18n'

[params.modules.llm]
  enabled = true
